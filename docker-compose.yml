services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: remitops-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "RemitOpsPassword123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'RemitOpsPassword123!' -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  sql_data:
